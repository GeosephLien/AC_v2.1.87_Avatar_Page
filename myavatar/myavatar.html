  <style>
    html,
    body,
    body * {
      -webkit-user-select: none;
      user-select: none;
      -webkit-touch-callout: none;
    }

    .viewer-loading {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: grid;
      place-items: center;
      pointer-events: none;
    }

    .viewer-loading[hidden] {
      display: none;
    }

    .viewer-loading-content {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 0.5rem;
      padding: 0;
      border: 0;
      background: transparent;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
    }

    .viewer-loading-spinner {
      width: 24px;
      height: 24px;
      border: 4px solid rgba(255, 255, 255, 0.22);
      border-top-color: rgba(255, 255, 255, 0.95);
      border-radius: 50%;
      box-shadow: 0 0 10px rgba(180, 208, 255, 0.28);
      animation: viewer-loading-spin 0.85s linear infinite;
    }

    .viewer-loading-text {
      font-size: 0.85rem;
      font-weight: 500;
      letter-spacing: 0.03em;
      color: rgba(243, 247, 255, 0.9);
    }

    @keyframes viewer-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }
</style>

    const deleteCancelButton = deleteConfirm.querySelector('[data-confirm-cancel]');
    const creatorOpenButton = document.querySelector('[data-creator-open]');

    const controlsStack = document.querySelector('.controls-stack');
    const controlPanel = document.querySelector('.control-panel');
    const controlPanelToggle = document.querySelector('.control-panel-toggle');
    const scene = new THREE.Scene();
    const rootStyle = document.documentElement;
    const userAgent = navigator.userAgent || '';
    const isMobileAvatarActions = window.matchMedia('(hover: none) and (pointer: coarse)').matches
      || /Android|iPhone|iPad|iPod|Mobile/i.test(userAgent);
    const isIOSDevice = /iP(ad|hone|od)/i.test(userAgent)
      || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
    const isSafariBrowser = /Safari/i.test(userAgent)
      && !/CriOS|FxiOS|EdgiOS|OPiOS|YaBrowser|DuckDuckGo/i.test(userAgent);
    const isIOSSafari = isIOSDevice && isSafariBrowser;
    const mobileLongPressDelayMs = 240;
    const mobileLongPressMoveTolerance = 10;
    scene.background = null;

    if (isMobileAvatarActions) {
      document.body.classList.add('is-mobile-avatar-device');
    } else {
      document.body.classList.add('is-desktop-avatar-device');
    }
    if (isIOSSafari) {
      document.body.classList.add('is-ios-safari');
    }

    document.addEventListener("selectstart", (event) => {

    document.addEventListener("contextmenu", (event) => {

    document.addEventListener("dragstart", (event) => {

    renderer.setPixelRatio(1.35);

    const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
    camera.position.set(0, 1.45, 2.8);

    scene.add(new THREE.HemisphereLight(0xffffff, 0xbcabe0, 3.6));

    const clock = new THREE.Clock();
    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register((parser) => new VRMLoaderPlugin(parser));
    loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

    let currentVrm = null;
    let mixer = null;
    let humanoid = null;
    let activeAvatarUrl = null;
    let animationFrameId = null;
    let isRenderPaused = false;
    let loadingOverlayCount = 0;
    const TARGET_FPS = 60;
    const FRAME_INTERVAL_MS = 1000 / TARGET_FPS;
    let lastFrameTimestamp = 0;

    const zoomConfig = [
      { bone: 'hips', offset: new THREE.Vector3(0, -0.08, 0), distance: 4.1, pivot: null },
      { bone: 'head', offset: new THREE.Vector3(0, 0, 0.02), distance: 1.2, pivot: null }

    let suppressNextAvatarSelection = false;
    let avatarSelectionSuppressTimeout = null;
    let mobileFloatingDeleteButton = null;

    const avatarLongPressState = {
      pointerId: null,
      entry: null,
      startX: 0,
      startY: 0,
      timer: null,
      triggered: false,
      deleteTargetActive: false
    };

    const preloadedAvatars = [
      {
        label: 'Lucy',
        vrmUrl: './vrms/Lucy_uqzn.vrm',
        downloadName: 'Lucy_uqzn.vrm'
      },
      {
        label: 'Jack',
        vrmUrl: './vrms/Jack_i6ex.vrm',
        downloadName: 'Jack_i6ex.vrm'
      },
      {
        label: 'Michael',
        vrmUrl: './vrms/Michael_b8ab.vrm',

        vrmUrl: './vrms/Zack_uanc.vrm',
        downloadName: 'Zack_uanc.vrm'
      }
    ];
    const uploadedAvatarStore = new Map();
    const thumbnailGradientStops = [
      ['#4a8dff', '#9d6bff', '#ff8a63'],
      ['#18b7a0', '#4b7eff', '#9f6dff'],
      ['#ff7b7b', '#ffb36b', '#6b8dff'],
      ['#11b5d8', '#2c7ef0', '#9b45f7'],
      ['#f25f8b', '#f59a58', '#ffd166']
    ];

    function buildAvatarActionControls(label, { canDownload = true, canDelete = true } = {}) {
      const fragment = document.createDocumentFragment();

      const menuButton = document.createElement('button');
      menuButton.className = 'avatar-menu-button';
      menuButton.type = 'button';
      menuButton.dataset.avatarMenu = '';
      menuButton.setAttribute('aria-label', `${label} actions`);
      menuButton.setAttribute('aria-expanded', 'false');

      const menuIcon = document.createElement('img');
      menuIcon.className = 'avatar-menu-icon';
      menuIcon.src = './images/Icon_menu_tb.svg';
      menuIcon.alt = '';
      menuIcon.setAttribute('aria-hidden', 'true');
      menuButton.append(menuIcon);

      const menuActiveOverlay = document.createElement('div');
      menuActiveOverlay.className = 'avatar-action-panel';
      menuActiveOverlay.dataset.avatarActions = '';
      menuActiveOverlay.hidden = true;

      if (canDownload) {
        const downloadButton = document.createElement('button');
        downloadButton.className = 'avatar-download-btn';
        downloadButton.type = 'button';
        downloadButton.dataset.avatarDownload = '';
        downloadButton.setAttribute('aria-label', `Download ${label}`);
        downloadButton.innerHTML = `
          <img src="./images/Icon_download.svg" alt="" aria-hidden="true">
        `;
        menuActiveOverlay.append(downloadButton);
      }

      if (canDelete && !isMobileAvatarActions) {
        const deleteButton = document.createElement('button');
        deleteButton.className = 'avatar-delete-btn';
        deleteButton.type = 'button';
        deleteButton.dataset.avatarDelete = '';
        deleteButton.setAttribute('aria-label', `Remove ${label}`);
        deleteButton.innerHTML = `
          <img src="./images/Icon_close.svg" alt="" aria-hidden="true">
        `;
        menuActiveOverlay.append(deleteButton);
      }

      if (menuActiveOverlay.childElementCount === 1) {
        menuActiveOverlay.classList.add('is-single-action');
      }

      fragment.append(menuButton, menuActiveOverlay);
      return fragment;
    }
    function sanitizeAvatarLabel(name) {
      const stem = name.replace(/\.[^.]+$/, '').trim();
      return stem || 'Uploaded avatar';
    }

    function toDownloadSlug(value) {
      return sanitizeAvatarLabel(value)
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'avatar';
    }

    function createRandomThumbnailGradient(context, size) {
      const colors = thumbnailGradientStops[Math.floor(Math.random() * thumbnailGradientStops.length)];
      const gradient = context.createLinearGradient(0, 0, size, size);
      gradient.addColorStop(0, colors[0]);
      gradient.addColorStop(0.52, colors[1]);
      gradient.addColorStop(1, colors[2]);
      return gradient;
    }

    function createAvatarEntryElement({ label, imageSrc, vrmUrl, avatarId, downloadName, thumbnailName, canDownload = true, canDelete = true }) {
      const entry = document.createElement('div');
      entry.className = 'avatar-entry';
      entry.dataset.avatarEntry = '';

      const button = document.createElement('button');
      button.className = 'avatar-button';
      button.type = 'button';
      button.dataset.avatarButton = '';
      button.dataset.vrm = vrmUrl;
      button.dataset.avatarId = avatarId;
      button.dataset.downloadName = downloadName;
      button.dataset.thumbnailName = thumbnailName;
      button.dataset.avatarLabel = label;
      button.setAttribute('aria-label', `Load ${label} avatar`);
      button.setAttribute('aria-pressed', 'false');

      const image = document.createElement('img');
      image.src = imageSrc;
      image.alt = `Load ${label} avatar`;
      image.draggable = false;

      button.append(image);
      entry.append(button);
      entry.append(buildAvatarActionControls(label, { canDownload, canDelete }));
      return entry;
    }

    function registerUploadedAvatar(file, thumbnailUrl) {
      const avatarId = `upload-${Date.now()}-${uploadedAvatarSequence += 1}`;
      const objectUrl = URL.createObjectURL(file);
      const label = sanitizeAvatarLabel(file.name);

      uploadedAvatarStore.set(avatarId, {
        file,
        label,
        objectUrl,
        thumbnailUrl
      });

      return {
        avatarId,
        label,
        objectUrl,
        thumbnailUrl,
        downloadName: file.name,
        thumbnailName: `${toDownloadSlug(file.name)}-thumb.png`
      };
    }

    function disposeUploadedAvatar(button) {
      const avatarId = button?.dataset.avatarId;
      if (!avatarId) {
        return;
      }

      const uploadedAvatar = uploadedAvatarStore.get(avatarId);
      if (!uploadedAvatar) {
        return;
      }

      URL.revokeObjectURL(uploadedAvatar.objectUrl);
      uploadedAvatarStore.delete(avatarId);
    }

    function triggerDownload(href, filename) {
      if (!href || !filename) {
        return;
      }

      const link = document.createElement('a');
      link.href = href;
      link.download = filename;
      document.body.append(link);
      link.click();
      link.remove();
    }

    function setLoadingVisible(visible) {
      if (!loadingOverlay) {
        return;
      }

      if (visible) {
        loadingOverlayCount += 1;
        loadingOverlay.hidden = false;
        return;
      }

      loadingOverlayCount = Math.max(loadingOverlayCount - 1, 0);
      if (loadingOverlayCount === 0) {
        loadingOverlay.hidden = true;
      }
    }

    function downloadAvatarEntry(entry) {
      const avatarButton = entry?.querySelector('[data-avatar-button]');
      if (!avatarButton) {
        return;
      }

      const downloadHref = avatarButton.dataset.vrm;
      if (!downloadHref) {
        return;
      }

      const downloadName = avatarButton.dataset.downloadName || downloadHref.split('/').pop() || 'avatar.vrm';
      const thumbnailImage = avatarButton.querySelector('img');
      const thumbnailHref = thumbnailImage?.currentSrc || thumbnailImage?.src || '';
      const thumbnailName = avatarButton.dataset.thumbnailName
        || thumbnailHref.split('/').pop()
        || `${toDownloadSlug(avatarButton.dataset.avatarLabel || downloadName)}-thumb.png`;

      triggerDownload(downloadHref, downloadName);

      if (thumbnailHref) {
        window.setTimeout(() => {
          triggerDownload(thumbnailHref, thumbnailName);
        }, 120);
      }
    }

    async function createAvatarThumbnail(url) {
      const thumbnailSize = 256;
      const renderCanvas = document.createElement('canvas');
      const outputCanvas = document.createElement('canvas');
      renderCanvas.width = thumbnailSize;
      renderCanvas.height = thumbnailSize;
      outputCanvas.width = thumbnailSize;
      outputCanvas.height = thumbnailSize;

      const renderer = new THREE.WebGLRenderer({
        canvas: renderCanvas,
        antialias: true,
        alpha: true,
        preserveDrawingBuffer: true
      });
      renderer.outputColorSpace = THREE.SRGBColorSpace;
      renderer.setPixelRatio(1.35);
      renderer.setSize(thumbnailSize, thumbnailSize, false);

      const thumbnailScene = new THREE.Scene();
      const thumbnailCamera = new THREE.PerspectiveCamera(22, 1, 0.01, 20);
      let thumbnailMixer = null;

      try {
        const avatarGltf = await loadGLTF(url);
        const vrm = avatarGltf.userData.vrm;
        if (!vrm) {
          throw new Error('VRM data was not found in the uploaded file.');
        }
        thumbnailScene.add(new THREE.HemisphereLight(0xffffff, 0xbcabe0, 3.6));


        VRMUtils.removeUnnecessaryVertices(avatarGltf.scene);
        VRMUtils.removeUnnecessaryJoints(avatarGltf.scene);
        vrm.scene.rotation.y = Math.PI;
        thumbnailScene.add(vrm.scene);
        vrm.update(0);
        vrm.scene.updateMatrixWorld(true);

        const animationGltf = await loadGLTF('./vrmas/ani_Idle_Stand_Female.vrma');
        const vrmAnimation = animationGltf.userData.vrmAnimations?.[0];
        if (vrmAnimation) {
          thumbnailMixer = new THREE.AnimationMixer(vrm.scene);
          const clip = createVRMAnimationClip(vrmAnimation, vrm);
          const action = thumbnailMixer.clipAction(clip);
          action.reset().play();
          thumbnailMixer.update(0.42);
          vrm.update(0.42);
          vrm.scene.updateMatrixWorld(true);
        }

        const bounds = new THREE.Box3().setFromObject(vrm.scene);
        const size = bounds.getSize(new THREE.Vector3());
        const fallbackTarget = bounds.getCenter(new THREE.Vector3()).add(new THREE.Vector3(0, size.y * 0.18, 0));
        const headBone = vrm.humanoid?.getNormalizedBoneNode('head') || vrm.humanoid?.getRawBoneNode('head') || null;
        const target = headBone ? headBone.getWorldPosition(new THREE.Vector3()) : fallbackTarget;
        target.y += 0.015;

        const faceSpan = Math.max(size.x * 0.34, size.y * 0.24, 0.24);
        const distance = Math.max(faceSpan / (2 * Math.tan(THREE.MathUtils.degToRad(thumbnailCamera.fov / 2))), 0.4) + size.z * 0.18;

        thumbnailCamera.lookAt(target);
        thumbnailCamera.far = Math.max(distance + size.z * 3, 10);
        thumbnailCamera.updateProjectionMatrix();

        renderer.render(thumbnailScene, thumbnailCamera);

        const outputContext = outputCanvas.getContext('2d');
        outputContext.fillStyle = createRandomThumbnailGradient(outputContext, thumbnailSize);
        outputContext.fillRect(0, 0, thumbnailSize, thumbnailSize);
        outputContext.drawImage(renderCanvas, 0, 0, thumbnailSize, thumbnailSize);

        thumbnailScene.remove(vrm.scene);
        VRMUtils.deepDispose(vrm.scene);

        }
        renderer.dispose();
        renderer.forceContextLoss();
      }

        const atEnd = scrollLeft >= maxScroll - 1;

        avatarSelectorViewport.style.setProperty('--avatar-fade-left', atStart ? '0px' : `${fadeSize}px`);
        avatarSelectorViewport.style.setProperty('--avatar-fade-right', atEnd ? '0px' : `${fadeSize}px`);

        const ratio = visibleWidth / contentWidth;
        const thumbWidth = Math.max(ratio * visibleWidth, 36);
        const travel = visibleWidth - thumbWidth;
        const progress = maxScroll === 0 ? 0 : scrollLeft / maxScroll;
        const thumbOffset = travel * progress;

        avatarScrollbarThumb.style.width = `${thumbWidth}px`;
        avatarScrollbarThumb.style.transform = `translateX(${thumbOffset}px)`;
      }

      updateAvatarScrollbar = updateScrollbar;

      function startInertia() {
        stopInertia();

        const minVelocity = 2.2;
        const brake = 0.965;

        function step() {
          if (isAvatarSelectorScrollLocked()) {
            state.velocity = 0;
            state.inertiaFrame = null;
            return;
          }

          state.velocity *= brake;
          avatarSelectorViewport.scrollLeft -= state.velocity;
          updateScrollbar();

          const maxScroll = avatarSelectorViewport.scrollWidth - avatarSelectorViewport.clientWidth;
          const atEdge = avatarSelectorViewport.scrollLeft <= 0 || avatarSelectorViewport.scrollLeft >= maxScroll;

          if (Math.abs(state.velocity) < minVelocity || atEdge) {
            state.velocity = 0;
            state.inertiaFrame = null;
            return;
          }

          state.inertiaFrame = requestAnimationFrame(step);
        }

        if (Math.abs(state.velocity) >= minVelocity) {
          state.inertiaFrame = requestAnimationFrame(step);
        }
      }

      avatarSelectorViewport.addEventListener('pointerdown', (event) => {
        if (isAvatarSelectorScrollLocked()) {
          return;
        }

        if (event.button !== 0) {
          return;
        }

        state.pointerId = event.pointerId;
        state.isPointerDown = true;
        state.isDragging = false;
        state.startX = event.clientX;
        state.lastX = event.clientX;
        state.lastTime = performance.now();
        state.startScrollLeft = avatarSelectorViewport.scrollLeft;
        state.velocity = 0;
        state.suppressClick = false;
        stopInertia();
      });

      avatarSelectorViewport.addEventListener('pointermove', (event) => {
        if (isAvatarSelectorScrollLocked()) {
          return;
        }

        if (!state.isPointerDown || event.pointerId !== state.pointerId) {
          return;
        }

        const deltaX = event.clientX - state.startX;
        const elapsed = Math.max(performance.now() - state.lastTime, 1);
        const movementX = event.clientX - state.lastX;

        if (Math.abs(deltaX) > 4) {
          if (!state.isDragging) {
            state.isDragging = true;
            state.suppressClick = true;
            avatarSelectorViewport.classList.add('is-dragging');
            avatarSelectorViewport.setPointerCapture(event.pointerId);
          }
        }

        avatarSelectorViewport.scrollLeft = state.startScrollLeft - deltaX;
        updateScrollbar();

        state.velocity = movementX / elapsed * 16;
        state.lastX = event.clientX;
        state.lastTime = performance.now();
      });

      function releasePointer(event) {
        if (event.pointerId !== state.pointerId) {
          return;
        }

        state.isPointerDown = false;
        avatarSelectorViewport.classList.remove('is-dragging');

        if (avatarSelectorViewport.hasPointerCapture(event.pointerId)) {
          avatarSelectorViewport.releasePointerCapture(event.pointerId);
        }

        if (state.isDragging) {
          startInertia();
          window.setTimeout(() => {
            state.suppressClick = false;
          }, 120);
        } else {
          state.suppressClick = false;
        }

        state.pointerId = null;
      }

      avatarSelectorViewport.addEventListener('pointerup', releasePointer);
      avatarSelectorViewport.addEventListener('pointercancel', releasePointer);
      avatarSelectorViewport.addEventListener('pointerleave', (event) => {
        if (state.isPointerDown) {
          releasePointer(event);
        }
      });

      avatarSelectorViewport.addEventListener('dragstart', (event) => {
        event.preventDefault();
      });

      avatarSelectorViewport.addEventListener('scroll', updateScrollbar, { passive: true });
      window.addEventListener('resize', updateScrollbar);

      avatarSelectorViewport.addEventListener('click', (event) => {
        if (state.suppressClick) {
          event.preventDefault();
          event.stopPropagation();
        }
      }, true);

      updateScrollbar();
    }

    async function loadAvatar(url) {
      if (!url || url === activeAvatarUrl) {
        return;
      }

      setLoadingVisible(true);

      try {
        clearError();
        disposeCurrentAvatar();

        const avatarGltf = await loadGLTF(url);
        const vrm = avatarGltf.userData.vrm;
        if (!vrm) {
          throw new Error('VRM data was not found in the loaded file.');
        }

        activeAvatarUrl = url;
        currentVrm = vrm;
        humanoid = vrm.humanoid;

        VRMUtils.removeUnnecessaryVertices(avatarGltf.scene);
        VRMUtils.removeUnnecessaryJoints(avatarGltf.scene);
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);
        vrm.update(0);
        cacheZoomPivots();
        frameModel(vrm.scene);
        cameraState.zoomIndex = 0;
        updateTargetPivot();
        cameraState.currentPivot.copy(cameraState.targetPivot);
        updateCamera(1 / 60);

        const animationGltf = await loadGLTF('./vrmas/ani_Idle_Stand_Female.vrma');
        const vrmAnimation = animationGltf.userData.vrmAnimations?.[0];

        if (vrmAnimation) {
          mixer = new THREE.AnimationMixer(vrm.scene);
          const clip = createVRMAnimationClip(vrmAnimation, vrm);
          mixer.clipAction(clip).reset().play();
        }
      } catch (error) {
        activeAvatarUrl = null;
        console.error(error);
        showError(`VRM load failed: ${error.message}`);
      } finally {
        setLoadingVisible(false);
      }
    }

    function bindAvatarButtons() {
      function resetAvatarLongPress() {
        if (avatarLongPressState.timer !== null) {
          window.clearTimeout(avatarLongPressState.timer);
          avatarLongPressState.timer = null;
        }

        const activeEntry = avatarLongPressState.entry;
        if (activeEntry) {
          hideMobileFloatingDeleteButton();
        }

        avatarLongPressState.pointerId = null;
        avatarLongPressState.entry = null;
        avatarLongPressState.startX = 0;
        avatarLongPressState.startY = 0;
        avatarLongPressState.triggered = false;
        avatarLongPressState.deleteTargetActive = false;
      }

      function armAvatarSelectionSuppression() {
        suppressNextAvatarSelection = true;
        if (avatarSelectionSuppressTimeout !== null) {
          window.clearTimeout(avatarSelectionSuppressTimeout);
        }
        avatarSelectionSuppressTimeout = window.setTimeout(() => {
          suppressNextAvatarSelection = false;
          avatarSelectionSuppressTimeout = null;
        }, 520);
      }

      if (isMobileAvatarActions) {
        avatarSelector.addEventListener('pointerdown', (event) => {
          if (event.pointerType !== 'touch') {
            return;
          }

          const avatarButton = event.target.closest('.avatar-button');
          if (!avatarButton || !avatarButton.hasAttribute('data-avatar-button')) {
            return;
          }

          const entry = avatarButton.closest('[data-avatar-entry]');
          if (!entry || entry.hidden) {
            return;
          }

          resetAvatarLongPress();
          avatarLongPressState.pointerId = event.pointerId;
          avatarLongPressState.entry = entry;
          avatarLongPressState.startX = event.clientX;
          avatarLongPressState.startY = event.clientY;
          avatarLongPressState.timer = window.setTimeout(() => {
            avatarLongPressState.triggered = true;
            armAvatarSelectionSuppression();
            openAvatarActionMenu(entry, { mobileLongPress: true });
            avatarLongPressState.deleteTargetActive = updateMobileDeleteHoverState(
              entry,
              avatarLongPressState.startX,
              avatarLongPressState.startY
            );
          }, mobileLongPressDelayMs);
        });

        window.addEventListener('pointermove', (event) => {
          if (event.pointerId !== avatarLongPressState.pointerId || avatarLongPressState.pointerId === null) {
            return;
          }

          if (avatarLongPressState.triggered) {
            avatarLongPressState.deleteTargetActive = updateMobileDeleteHoverState(
              avatarLongPressState.entry,
              event.clientX,
              event.clientY
            );
            return;
          }

          const moveX = Math.abs(event.clientX - avatarLongPressState.startX);
          const moveY = Math.abs(event.clientY - avatarLongPressState.startY);
          if (moveX > mobileLongPressMoveTolerance || moveY > mobileLongPressMoveTolerance) {
            resetAvatarLongPress();
          }
        });

        const releaseLongPress = (event) => {
          if (event.pointerId !== avatarLongPressState.pointerId) {
            return;
          }

          if (avatarLongPressState.triggered) {
            const entry = avatarLongPressState.entry;
            const shouldDelete = avatarLongPressState.deleteTargetActive
              || updateMobileDeleteHoverState(entry, event.clientX, event.clientY);
            armAvatarSelectionSuppression();
            resetAvatarLongPress();
            closeAvatarActionMenu(entry);

            if (shouldDelete) {
              const button = entry?.querySelector('[data-avatar-button]');
              if (button) {
                openDeleteConfirm(button);
              }
            }
            return;
          }

          resetAvatarLongPress();
        };

        window.addEventListener('pointerup', releaseLongPress);
        window.addEventListener('pointercancel', releaseLongPress);
      }

      avatarSelector.addEventListener('click', async (event) => {
        const menuButton = event.target.closest('[data-avatar-menu]');
        if (menuButton) {
          event.preventDefault();
          event.stopPropagation();
          if (!isMobileAvatarActions) {
            toggleAvatarActionMenu(menuButton.closest('[data-avatar-entry]'));
          }
          return;
        }

        const deleteButton = event.target.closest('[data-avatar-delete]');
        if (deleteButton) {
          event.preventDefault();
          event.stopPropagation();
          closeAvatarActionMenu(deleteButton.closest('[data-avatar-entry]'));
          const button = deleteButton.closest('[data-avatar-entry]')?.querySelector('.avatar-button');
          if (button) {
            openDeleteConfirm(button);
          }
          return;
        }

        const downloadButton = event.target.closest('[data-avatar-download]');
        if (downloadButton) {
          event.preventDefault();
          event.stopPropagation();
          const entry = downloadButton.closest('[data-avatar-entry]');
          closeAvatarActionMenu(entry);
          downloadAvatarEntry(entry);
          return;
        }

        const button = event.target.closest('.avatar-button');
        if (!button) {
          closeAvatarActionMenu();
          return;
        }

        if (!button.hasAttribute('data-avatar-button')) {
          return;
        }

        if (suppressNextAvatarSelection) {
          suppressNextAvatarSelection = false;
          if (avatarSelectionSuppressTimeout !== null) {
            window.clearTimeout(avatarSelectionSuppressTimeout);
            avatarSelectionSuppressTimeout = null;
          }
          return;
        }

        const nextUrl = button.dataset.vrm;
        if (!nextUrl) {
          return;
        }

        setActiveAvatarButton(nextUrl);
        await loadAvatar(nextUrl);

        if (!currentVrm) {
          setActiveAvatarButton(activeAvatarUrl);
        }

        closeAvatarActionMenu();
      });

      document.addEventListener('click', (event) => {
        if (!avatarSelector.contains(event.target)) {
          closeAvatarActionMenu();
        }
      });
    }

    function bindDeleteConfirm() {
      deleteConfirm.addEventListener('click', (event) => {
        if (event.target === deleteConfirm) {
          closeDeleteConfirm();
        }
      });

      deleteCancelButton.addEventListener('click', () => {
        closeDeleteConfirm();
      });

      deleteConfirmButton.addEventListener('click', () => {
        if (pendingDeleteButton) {
          removeAvatarEntry(pendingDeleteButton);
        }
        closeDeleteConfirm();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !deleteConfirm.hidden) {
          closeDeleteConfirm();
        }
      });
    }

    function bindCreatorPanel() {
      creatorOpenButton.addEventListener('click', () => {
        openCreatorPanel();
      });

      creatorBackButton?.addEventListener('click', () => {
        creatorFrame
          ?.contentWindow
          ?.postMessage({ type: 'avatar-creator-reset' }, '*');
        creatorBackButton.hidden = true;
      });

      creatorCloseButton.addEventListener('click', () => {
        closeCreatorPanel();
      });

      creatorOverlay.addEventListener('click', (event) => {
        if (event.target === creatorOverlay) {
          closeCreatorPanel();
        }
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === 'Escape' && !creatorOverlay.hidden) {
          closeCreatorPanel();
        }
      });

      window.addEventListener('message', async (event) => {
        if (event.data?.type === 'avatar-creator-unity-started') {
          if (creatorBackButton) {
            creatorBackButton.hidden = false;
          }
          return;
        }

        if (event.data?.type === 'avatar-creator-landing') {
          if (creatorBackButton) {
            creatorBackButton.hidden = true;
          }
          return;
        }

        if (event.data?.type === 'avatar-upload-error') {
          showError(event.data.message || 'VRM upload failed.');
          return;
        }

        if (event.data?.type !== 'avatar-upload-vrm') {
          return;
        }

        try {
          await addUploadedAvatar(event.data.file);
        } catch (error) {
          console.error(error);
          showError(`VRM upload failed: ${error.message}`);
        }
      });
    }

    function bindControlPanelBehavior() {
      if (!controlsStack || !controlPanel) {
        return;
      }

      function setDesktopCollapsed(collapsed) {
        const isCollapsed = Boolean(collapsed);
        document.body.classList.toggle('is-desktop-controls-collapsed', isCollapsed);
        if (controlPanelToggle) {
          controlPanelToggle.setAttribute('aria-expanded', String(!isCollapsed));
        }
      }

      function setMobileCollapsed(collapsed) {
        const isCollapsed = Boolean(collapsed);
        document.body.classList.toggle('is-mobile-controls-collapsed', isCollapsed);
        if (controlPanelToggle) {
          controlPanelToggle.setAttribute('aria-expanded', String(!isCollapsed));
        }
      }

      if (isMobileAvatarActions) {
        setMobileCollapsed(false);

        controlPanelToggle?.addEventListener('click', () => {
          setMobileCollapsed(false);
        });
        if (isIOSSafari) {
          return;
        }
        window.addEventListener('pointerdown', (event) => {
          if (document.body.classList.contains('is-mobile-controls-collapsed')) {
            return;
          }

          const target = event.target;
          if (!(target instanceof Element)) {
            return;
          }

          if (target.closest('.controls-stack, .control-panel-toggle')) {
            return;
          }

          setMobileCollapsed(true);
        }, true);
        return;
      }

      setDesktopCollapsed(false);
      controlPanelToggle?.addEventListener('pointerenter', () => {
        setDesktopCollapsed(false);
      });
      controlPanelToggle?.addEventListener('focusin', () => {
        setDesktopCollapsed(false);
      });
      window.addEventListener('pointerdown', (event) => {
        const target = event.target;
        if (!(target instanceof Element)) {
          return;
        }

        if (target.closest('.controls-stack, .control-panel-toggle')) {
          return;
        }

        setDesktopCollapsed(true);
      }, true);
      controlsStack.addEventListener('focusout', (event) => {
        const nextTarget = event.relatedTarget;
        if (nextTarget instanceof Element && controlsStack.contains(nextTarget)) {
          return;
        }
        setDesktopCollapsed(true);
      });
    }

    function animate(timestamp = 0) {
      animationFrameId = requestAnimationFrame(animate);

      if (lastFrameTimestamp === 0) {
        lastFrameTimestamp = timestamp;
      }

      const elapsed = timestamp - lastFrameTimestamp;
      if (elapsed < FRAME_INTERVAL_MS) {
        return;
      }

      lastFrameTimestamp = timestamp - (elapsed % FRAME_INTERVAL_MS);
      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
      }

      if (currentVrm) {
        currentVrm.update(delta);
      }

      updateCamera(delta);
      renderer.render(scene, camera);
    }

    function pauseRenderLoop() {
      if (isRenderPaused) {
        return;
      }

      isRenderPaused = true;

      if (animationFrameId !== null) {
        cancelAnimationFrame(animationFrameId);
        animationFrameId = null;
      }

      lastFrameTimestamp = 0;
      clock.stop();
    }

    function resumeRenderLoop() {
      if (!isRenderPaused) {
        return;
      }

      isRenderPaused = false;
      clock.start();
      lastFrameTimestamp = 0;
      animate();
    }
    async function initializePage() {
      setLoadingVisible(true);
      updateViewportMetrics();
      resizeRenderer();
      window.addEventListener('resize', handleViewportChange);
      if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleViewportChange);
        window.visualViewport.addEventListener('scroll', handleViewportChange);
      }
      bindPointerControls();
      bindControlPanelBehavior();
      bindAvatarSelectorScroll();
      bindAvatarButtons();
      bindDeleteConfirm();
      bindCreatorPanel();
      try {
        await startBackgroundIntro();

        try {
          await addPreloadedAvatars();
        } catch (error) {
          console.error(error);
          showError(`Preloaded avatar setup failed: ${error.message}`);
        }

        const firstAvatarButton = getVisibleAvatarButtons()[0] || null;
        if (firstAvatarButton?.dataset.vrm) {
          setActiveAvatarButton(firstAvatarButton.dataset.vrm);
          await loadAvatar(firstAvatarButton.dataset.vrm);
        } else {
          openCreatorPanel();
        }
      } finally {
        setLoadingVisible(false);
      }
      animate();
    }

    initializePage();
  </script>
</body>
