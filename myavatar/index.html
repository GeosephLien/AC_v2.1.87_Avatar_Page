<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Avatar</title>
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.1/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.1/examples/jsm/",
        "@pixiv/three-vrm": "https://esm.sh/@pixiv/three-vrm@2.1.2?bundle&external=three",
        "@pixiv/three-vrm-animation": "https://esm.sh/@pixiv/three-vrm-animation@2.1.2?bundle&external=three,@pixiv/three-vrm"
      }
    }
  </script>
</head>
  <body>
    <main class="page-shell">
      <div class="controls-stack">
        <a class="btn btn-primary creator-button" href="http://127.0.0.1:5501/index.html">Avatar Creator</a>
        <aside class="control-panel" aria-label="Avatar controls">
          <div class="avatar-selector" aria-label="Avatar selector">
            <button
              class="avatar-button is-active"
              type="button"
              data-avatar-button
              data-vrm="./vrms/Iris_o3vg.vrm"
              aria-pressed="true"
            >
              <img src="./images/thb_Iris.png" alt="Load Iris avatar">
            </button>
            <button
              class="avatar-button"
              type="button"
              data-avatar-button
              data-vrm="./vrms/Michael_b8ab.vrm"
              aria-pressed="false"
            >
              <img src="./images/thb_Michael.png" alt="Load Michael avatar">
            </button>
          </div>
        </aside>
      </div>
      <section class="viewer-stage">
        <canvas id="avatar-canvas" aria-label="VRM avatar preview"></canvas>
        <div class="viewer-error" id="viewer-error" hidden></div>
    </section>
  </main>

  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { VRMLoaderPlugin, VRMUtils } from '@pixiv/three-vrm';
    import {
      VRMAnimationLoaderPlugin,
      createVRMAnimationClip
    } from '@pixiv/three-vrm-animation';

    const canvas = document.getElementById('avatar-canvas');
    const errorPanel = document.getElementById('viewer-error');
    const avatarButtons = [...document.querySelectorAll('[data-avatar-button]')];
    const scene = new THREE.Scene();
    scene.background = null;

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      alpha: true
    });
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const camera = new THREE.PerspectiveCamera(30, 1, 0.1, 100);
    camera.position.set(0, 1.45, 2.8);

    scene.add(new THREE.HemisphereLight(0xffffff, 0x3c3455, 1.8));

    const keyLight = new THREE.DirectionalLight(0xffffff, 1.6);
    keyLight.position.set(1.2, 2.4, 2.2);
    scene.add(keyLight);

    const rimLight = new THREE.DirectionalLight(0x9db3ff, 1.2);
    rimLight.position.set(-1.5, 1.8, -1.6);
    scene.add(rimLight);

    const floorTextureCanvas = document.createElement('canvas');
    floorTextureCanvas.width = 512;
    floorTextureCanvas.height = 512;
    const floorTextureContext = floorTextureCanvas.getContext('2d');
    const floorGradient = floorTextureContext.createRadialGradient(256, 256, 30, 256, 256, 256);
    floorGradient.addColorStop(0, 'rgba(255, 255, 255, 0.34)');
    floorGradient.addColorStop(0.38, 'rgba(203, 220, 255, 0.2)');
    floorGradient.addColorStop(0.68, 'rgba(130, 160, 255, 0.1)');
    floorGradient.addColorStop(1, 'rgba(130, 160, 255, 0)');
    floorTextureContext.fillStyle = floorGradient;
    floorTextureContext.fillRect(0, 0, 512, 512);

    const floorTexture = new THREE.CanvasTexture(floorTextureCanvas);
    floorTexture.colorSpace = THREE.SRGBColorSpace;

    const floor = new THREE.Mesh(
      new THREE.CircleGeometry(1.08, 64),
      new THREE.MeshBasicMaterial({
        map: floorTexture,
        transparent: true,
        depthWrite: false
      })
    );
    floor.rotation.x = -Math.PI / 2;
    floor.position.y = -0.02;
    scene.add(floor);

    const clock = new THREE.Clock();
    const loader = new GLTFLoader();
    loader.crossOrigin = 'anonymous';
    loader.register((parser) => new VRMLoaderPlugin(parser));
    loader.register((parser) => new VRMAnimationLoaderPlugin(parser));

    let currentVrm = null;
    let mixer = null;
    let humanoid = null;
    let activeAvatarUrl = null;

    const zoomConfig = [
      { bone: 'hips', offset: new THREE.Vector3(0, 0.05, 0), distance: 3.6, pivot: null },
      { bone: 'head', offset: new THREE.Vector3(0, 0, 0.02), distance: 1.05, pivot: null }
    ];

    const dragState = {
      active: false,
      lastX: 0,
      lastY: 0
    };

    const cameraState = {
      yaw: 0,
      pitch: THREE.MathUtils.degToRad(5),
      targetYaw: 0,
      targetPitch: THREE.MathUtils.degToRad(5),
      distance: 2.35,
      targetDistance: 2.35,
      zoomIndex: 0,
      currentPivot: new THREE.Vector3(0, 1, 0),
      targetPivot: new THREE.Vector3(0, 1, 0),
      pitchMin: THREE.MathUtils.degToRad(-10),
      pitchMax: THREE.MathUtils.degToRad(60),
      yawSpeed: 0.0085,
      pitchSpeed: 0.0085,
      yawBrake: 8,
      pitchBrake: 8,
      zoomBrake: 10,
      pivotBrake: 10
    };

    function showError(message) {
      errorPanel.textContent = message;
      errorPanel.hidden = false;
    }

    function clearError() {
      errorPanel.hidden = true;
      errorPanel.textContent = '';
    }

    function resizeRenderer() {
      const frame = canvas.parentElement;
      const width = frame.clientWidth;
      const height = frame.clientHeight;
      renderer.setSize(width, height, false);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
    }

    async function loadGLTF(url) {
      return await new Promise((resolve, reject) => {
        loader.load(url, resolve, undefined, reject);
      });
    }

    function setActiveAvatarButton(url) {
      avatarButtons.forEach((button) => {
        const isActive = button.dataset.vrm === url;
        button.classList.toggle('is-active', isActive);
        button.setAttribute('aria-pressed', String(isActive));
      });
    }

    function disposeCurrentAvatar() {
      if (!currentVrm) {
        return;
      }

      if (mixer) {
        mixer.stopAllAction();
        mixer = null;
      }

      scene.remove(currentVrm.scene);
      VRMUtils.deepDispose(currentVrm.scene);
      currentVrm = null;
      humanoid = null;
    }

    function damp(current, target, lambda, dt) {
      return THREE.MathUtils.lerp(current, target, 1 - Math.exp(-lambda * dt));
    }

    function getBoneNode(name) {
      if (!humanoid) {
        return null;
      }

      return humanoid.getNormalizedBoneNode(name) || humanoid.getRawBoneNode(name) || null;
    }

    function getZoomPivot(index) {
      const step = zoomConfig[index] || zoomConfig[0];

      if (step.pivot) {
        return step.pivot.clone();
      }

      const fallback = new THREE.Box3().setFromObject(currentVrm.scene);
      return fallback.getCenter(new THREE.Vector3());
    }

    function setZoomIndex(nextIndex) {
      const clamped = THREE.MathUtils.clamp(nextIndex, 0, zoomConfig.length - 1);
      if (clamped === cameraState.zoomIndex) {
        return;
      }

      cameraState.zoomIndex = clamped;
      cameraState.targetDistance = zoomConfig[clamped].distance;
      cameraState.targetPivot.copy(getZoomPivot(clamped));
    }

    function cacheZoomPivots() {
      for (const step of zoomConfig) {
        const bone = getBoneNode(step.bone);

        if (bone) {
          const worldPosition = new THREE.Vector3();
          bone.getWorldPosition(worldPosition);
          step.pivot = worldPosition.add(step.offset);
          continue;
        }

        const fallback = new THREE.Box3().setFromObject(currentVrm.scene);
        step.pivot = fallback.getCenter(new THREE.Vector3());
      }
    }

    function updateTargetPivot() {
      cameraState.targetPivot.copy(getZoomPivot(cameraState.zoomIndex));
    }

    function updateCamera(dt) {
      cameraState.yaw = damp(cameraState.yaw, cameraState.targetYaw, cameraState.yawBrake, dt);
      cameraState.pitch = damp(cameraState.pitch, cameraState.targetPitch, cameraState.pitchBrake, dt);
      cameraState.distance = damp(cameraState.distance, cameraState.targetDistance, cameraState.zoomBrake, dt);
      cameraState.currentPivot.lerp(cameraState.targetPivot, 1 - Math.exp(-cameraState.pivotBrake * dt));

      const cosPitch = Math.cos(cameraState.pitch);
      const sinPitch = Math.sin(cameraState.pitch);
      const sinYaw = Math.sin(cameraState.yaw);
      const cosYaw = Math.cos(cameraState.yaw);

      camera.position.set(
        cameraState.currentPivot.x + sinYaw * cosPitch * cameraState.distance,
        cameraState.currentPivot.y + sinPitch * cameraState.distance,
        cameraState.currentPivot.z + cosYaw * cosPitch * cameraState.distance
      );

      camera.lookAt(cameraState.currentPivot);
    }

    function frameModel(root) {
      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      const maxSize = Math.max(size.x, size.y, size.z);
      zoomConfig[0].distance = Math.max(maxSize * 1.28, 2.5);
      zoomConfig[1].distance = Math.max(maxSize * 0.38, 0.9);
      cameraState.distance = zoomConfig[0].distance;
      cameraState.targetDistance = zoomConfig[0].distance;
      cameraState.currentPivot.copy(center);
      cameraState.targetPivot.copy(center);
      camera.near = 0.01;
      camera.far = Math.max(maxSize * 10, 20);
      camera.updateProjectionMatrix();
    }

    function bindPointerControls() {
      canvas.addEventListener('pointerdown', (event) => {
        dragState.active = true;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;
        canvas.setPointerCapture(event.pointerId);
      });

      canvas.addEventListener('pointermove', (event) => {
        if (!dragState.active) {
          return;
        }

        const deltaX = event.clientX - dragState.lastX;
        const deltaY = event.clientY - dragState.lastY;
        dragState.lastX = event.clientX;
        dragState.lastY = event.clientY;

        cameraState.targetYaw -= deltaX * cameraState.yawSpeed;
        cameraState.targetPitch = THREE.MathUtils.clamp(
          cameraState.targetPitch + deltaY * cameraState.pitchSpeed,
          cameraState.pitchMin,
          cameraState.pitchMax
        );
      });

      function releasePointer(event) {
        dragState.active = false;
        if (canvas.hasPointerCapture(event.pointerId)) {
          canvas.releasePointerCapture(event.pointerId);
        }
      }

      canvas.addEventListener('pointerup', releasePointer);
      canvas.addEventListener('pointercancel', releasePointer);
      canvas.addEventListener('wheel', (event) => {
        event.preventDefault();
        if (event.deltaY < 0) {
          setZoomIndex(cameraState.zoomIndex + 1);
        } else if (event.deltaY > 0) {
          setZoomIndex(cameraState.zoomIndex - 1);
        }
      }, { passive: false });
    }

    async function loadAvatar(url) {
      if (!url || url === activeAvatarUrl) {
        return;
      }

      try {
        clearError();
        disposeCurrentAvatar();

        const avatarGltf = await loadGLTF(url);
        const vrm = avatarGltf.userData.vrm;
        if (!vrm) {
          throw new Error('VRM data was not found in the loaded file.');
        }

        activeAvatarUrl = url;
        currentVrm = vrm;
        humanoid = vrm.humanoid;

        VRMUtils.removeUnnecessaryVertices(avatarGltf.scene);
        VRMUtils.removeUnnecessaryJoints(avatarGltf.scene);
        vrm.scene.rotation.y = Math.PI;
        scene.add(vrm.scene);
        vrm.update(0);
        cacheZoomPivots();
        frameModel(vrm.scene);
        cameraState.zoomIndex = 0;
        updateTargetPivot();
        cameraState.currentPivot.copy(cameraState.targetPivot);
        updateCamera(1 / 60);

        const animationGltf = await loadGLTF('./vrmas/ani_Idle_Stand_Female.vrma');
        const vrmAnimation = animationGltf.userData.vrmAnimations?.[0];

        if (vrmAnimation) {
          mixer = new THREE.AnimationMixer(vrm.scene);
          const clip = createVRMAnimationClip(vrmAnimation, vrm);
          mixer.clipAction(clip).reset().play();
        }
      } catch (error) {
        activeAvatarUrl = null;
        console.error(error);
        showError(`VRM load failed: ${error.message}`);
      }
    }

    function bindAvatarButtons() {
      avatarButtons.forEach((button) => {
        button.addEventListener('click', async () => {
          const nextUrl = button.dataset.vrm;
          if (!nextUrl) {
            return;
          }

          setActiveAvatarButton(nextUrl);
          await loadAvatar(nextUrl);

          if (!currentVrm) {
            setActiveAvatarButton(activeAvatarUrl);
          }
        });
      });
    }

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();

      if (mixer) {
        mixer.update(delta);
      }

      if (currentVrm) {
        currentVrm.update(delta);
      }

      updateCamera(delta);
      renderer.render(scene, camera);
    }

    resizeRenderer();
    window.addEventListener('resize', resizeRenderer);
    bindPointerControls();
    bindAvatarButtons();
    loadAvatar('./vrms/Iris_o3vg.vrm');
    animate();
  </script>
</body>
</html>
