<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Landing Header</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page">
    <div class="top-strip">
      <span class="htc-mark">HTC</span>
    </div>

    <header class="site-header">
      <div class="header-inner">
        <a class="brand" href="#" aria-label="VIVERSE Avatar">
          <img class="brand-logo" src="../images/VIVERSE_MainLogo_Digital_Primary_Gradient_Black.svg" alt="VIVERSE logo">
          <span class="brand-name">VIVERSE</span>
          <span class="brand-divider" aria-hidden="true"></span>
          <span class="brand-text">Avatar</span>
        </a>

        <nav class="main-nav" aria-label="Primary">
          <a href="#">Worlds</a>
          <a href="#">Create</a>
          <a href="#">Business</a>
          <a href="#">Marketplace</a>
          <a class="active" href="#">Avatar</a>
          <a href="#">Blog</a>
        </nav>

        <div class="header-actions">
          <button class="icon-button" type="button" aria-label="Language">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 2a10 10 0 1 0 0 20a10 10 0 0 0 0-20Zm6.92 9h-3.02a15.55 15.55 0 0 0-1.34-5.02A8.03 8.03 0 0 1 18.92 11ZM12 4.04c.89 1.08 1.95 3.41 2.38 6.96H9.62C10.05 7.45 11.11 5.12 12 4.04ZM9.44 5.98A15.55 15.55 0 0 0 8.1 11H5.08a8.03 8.03 0 0 1 4.36-5.02ZM5.08 13H8.1a15.55 15.55 0 0 0 1.34 5.02A8.03 8.03 0 0 1 5.08 13Zm6.92 6.96c-.89-1.08-1.95-3.41-2.38-6.96h4.76c-.43 3.55-1.49 5.88-2.38 6.96Zm2.56-1.94A15.55 15.55 0 0 0 15.9 13h3.02a8.03 8.03 0 0 1-4.36 5.02Z"/>
            </svg>
          </button>

          <a class="cta-button" href="#">Create for Free</a>

          <div class="divider" aria-hidden="true"></div>

          <button class="pill-button" type="button" aria-label="Points">
            <span class="pill-icon">&#10022;</span>
            <span>635</span>
          </button>

          <button class="icon-button" type="button" aria-label="Notifications">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-4H5v-1.5l1.5-1.5V11a5.5 5.5 0 0 1 4.5-5.4V5a1 1 0 1 1 2 0v.6A5.5 5.5 0 0 1 17.5 11v4l1.5 1.5V18Z"/>
            </svg>
          </button>

          <button class="avatar-button" type="button" aria-label="Profile">
            <span class="avatar-gradient"></span>
          </button>
        </div>
      </div>
    </header>

    <main class="content-black" aria-label="Landing content placeholder"></main>
  </div>
</body>
</html>
